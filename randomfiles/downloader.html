<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Downloader</title>

<style>
*{
    box-sizing:border-box;
    font-family:Segoe UI,Arial,sans-serif;
}

body{
    margin:0;
    background:#111;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:400px;
    background:#1b1b1b;
    border:1px solid #2d2d2d;
    border-radius:12px;
    padding:28px;
    box-shadow:0 0 30px rgba(0,0,0,.45);
}

h2{
    margin:0 0 18px;
    font-weight:500;
    font-size:22px;
}

input{
    width:100%;
    padding:12px;
    background:#252525;
    color:white;
    border:1px solid #3d3d3d;
    border-radius:8px;
    outline:none;
    transition:.2s;
}

input:focus{
    border-color:#5a8cff;
}

button{
    width:100%;
    margin-top:14px;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#3b82f6;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    background:#2563eb;
}

#status{
    margin-top:18px;
    color:#7dff98;
    text-align:center;
    min-height:22px;
}
</style>
</head>

<body>

<div class="container">
    <h2>Type your entrance code</h2>

    <input
        id="code"
        type="text"
        placeholder="piolovesfud...."
        autocomplete="off">

    <button onclick="checkCode()">Download</button>

    <div id="status"></div>
</div>

<div id="iframeContainer"></div>
  
<script>
const SECRET = "PioLuvsGeometryDash";
const DOWNLOAD_URL = "https://filebin.net/v55nw2dq00hax14z/GeometryPapers.docx";

function checkCode() {
    const input = document.getElementById("code").value.trim();
    const status = document.getElementById("status");

    if (input === SECRET) {
        status.style.color = "#8aff8a";
        status.textContent = "Downloading for pio :D";

        setTimeout(() => {
            window.location.href = DOWNLOAD_URL;
        }, 1000); // Redirect after 1 second
    } else {
        status.style.color = "#ff6b6b";
        status.textContent = "Incorrect code.";
    }
}
</script>



</body>
</html>
